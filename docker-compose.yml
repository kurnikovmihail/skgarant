services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skgarant-api
    environment:
      NODE_ENV: production
      API_PORT: 3001
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret}
    volumes:
      - skgarant_data:/app/backend/data
      - skgarant_uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: skgarant-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  skgarant_data:
  skgarant_uploads:
